<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phở Tiến Vua</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 20px;
            margin: 0;
        }
        .product-card {
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2c);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button.add-btn {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    
    <h2>🍜 Phở Tiến Vua</h2>
    <p id="greeting"></p>

    <div class="product-card">
        <h3>Phở Bát Đá Thượng Hạng</h3>
        <p>Giá: 99.000 VNĐ</p>
        <button class="add-btn" id="add-to-cart">Thêm vào giỏ hàng</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        // Mở rộng app full màn hình cho xịn
        tg.expand(); 

        const user = tg.initDataUnsafe?.user;
        document.getElementById('greeting').innerHTML = user ? `Xin chào thực khách <b>${user.first_name}</b>!` : "Chào mừng quý khách!";

        // Thiết lập Main Button (Nút to ở đáy màn hình)
        tg.MainButton.text = "THANH TOÁN (0 VNĐ)";
        tg.MainButton.textColor = "#ffffff";
        tg.MainButton.color = "#2ecc71"; // Màu xanh lá chốt sale

        let total = 0;

        // Bắt sự kiện khi bấm nút "Thêm vào giỏ hàng"
        document.getElementById('add-to-cart').addEventListener('click', () => {
            // Rung nhẹ điện thoại
            tg.HapticFeedback.impactOccurred('light');
            
            total += 99000;
            
            // Cập nhật giá và hiện Nút to lên
            tg.MainButton.text = `ĐẶT HÀNG (${total.toLocaleString('vi-VN')} VNĐ)`;
            tg.MainButton.show();
        });

        // Bắt sự kiện khi khách bấm vào Nút To ở đáy màn hình
        tg.MainButton.onClick(() => {
            tg.showAlert(`Đã chốt đơn: ${total.toLocaleString('vi-VN')} VNĐ. Backend sẽ xử lý sau nhé sếp!`);
        });

    </script>
</body>
</html>
