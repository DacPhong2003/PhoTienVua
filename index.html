<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App Vibe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family: sans-serif; text-align: center; margin-top: 50px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color);">
    
    <h2>Mini App Vibe 🚀</h2>
    <p id="greeting">Đang kết nối với Telegram...</p>

    <<script>
        const greeting = document.getElementById('greeting');

        // Kiểm tra xem SDK của Telegram đã load thành công chưa
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready(); 

            const user = tg.initDataUnsafe?.user;

            if (user) {
                greeting.innerHTML = `Chào sếp <b>${user.first_name}</b>!`;
            } else {
                greeting.innerHTML = "SDK đã chạy, nhưng sếp đang mở ngoài trình duyệt. Hãy mở trong Tele nhé!";
            }
        } else {
            // Nếu không có SDK (do chạy local bị chặn)
            greeting.innerHTML = "Môi trường Local không tải được Telegram SDK. Sếp phải đẩy lên mạng (HTTPS) thôi!";
        }
    </script>
</body>
</html>
